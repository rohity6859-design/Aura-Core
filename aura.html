<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKR Aura - Mission 2030</title>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .dashboard { border: 2px solid #d4af37; padding: 25px; display: inline-block; box-shadow: 0 0 25px #d4af37; border-radius: 20px; background: #111; margin-top: 40px; width: 90%; max-width: 400px; }
        h1 { color: #f2d06b; letter-spacing: 3px; margin-bottom: 5px; }
        .owner-tag { color: #fff; font-size: 1.1em; margin-bottom: 20px; display: block; }
        .status-box { text-align: left; background: #000; padding: 15px; border-radius: 12px; border-left: 4px solid #00ff00; margin: 15px 0; font-family: monospace; }
        .btn { background: linear-gradient(45deg, #d4af37, #f2d06b); color: black; padding: 15px; text-decoration: none; font-weight: bold; border-radius: 50px; display: block; margin-top: 15px; border: none; width: 100%; cursor: pointer; }
        #secret-panel { display: none; margin-top: 20px; padding: 15px; border: 1px dashed #00ff00; background: #001100; border-radius: 10px; color: #00ff00; text-align: left; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>YKR AURA V1.8</h1>
        <span class="owner-tag">Chief Executive: <strong>YADAV SHER</strong></span>
        
        <div class="status-box">
            <div>🛰️ SYSTEM: <span style="color:#00ff00;">ONLINE</span></div>
            <div id="market-status">📈 MARKET: Loading...</div>
            <div>🛡️ MAZE: 10B ACTIVE</div>
        </div>

        <a href="https://instagram.com/classy.rohit.07" target="_blank" style="color:#E1306C; text-decoration:none; font-size:14px;">Follow Admin: @classy.rohit.07</a>
        
        <button class="btn" onclick="checkAccess()">SECURE ADMIN LOGIN</button>

        <div id="secret-panel">
            <p>🔓 ACCESS GRANTED, SHER!</p>
            <p>➤ Tracking Billionaire Assets...</p>
            <p>➤ Ghost Mode: Ready</p>
            <p>➤ Next Update: AI Chat Integration</p>
        </div>
    </div>

    <script>
        function checkAccess() {
            let key = prompt("Enter YKR Private Key:");
            if (key === "YADAV7") {
                alert("Welcome Back, Yadav Sher!");
                document.getElementById('secret-panel').style.display = 'block';
            } else {
                alert("Security Breach! Entering 10,000 Crore Bhoolbhulaiya...");
            }
        }

        async function fetchMarket() {
            try {
                const res = await fetch('https://api.coindesk.com/v1/bpi/currentprice.json');
                const data = await res.json();
                document.getElementById('market-status').innerText = "📈 BTC: $" + data.bpi.USD.rate;
            } catch(e) { document.getElementById('market-status').innerText = "📈 MARKET: Encrypted"; }
        }
        fetchMarket();
        setInterval(fetchMarket, 15000);
    </script>
</body>
</html>
