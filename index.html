<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKR Aura - Global Dashboard</title>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .dashboard { border: 2px solid #d4af37; padding: 30px; display: inline-block; box-shadow: 0 0 30px #d4af37; border-radius: 20px; background: #111; margin-top: 50px; width: 90%; max-width: 450px; }
        h1 { letter-spacing: 5px; color: #f2d06b; text-shadow: 2px 2px #000; margin-bottom: 5px; }
        .owner { font-size: 1.1em; margin-bottom: 20px; color: #fff; letter-spacing: 2px; }
        .status-box { text-align: left; background: #000; padding: 15px; border-radius: 10px; border-left: 5px solid #00ff00; margin: 15px 0; }
        .btc-box { color: #00ff00; font-weight: bold; font-size: 1.1em; }
        .btn { background: linear-gradient(45deg, #d4af37, #f2d06b); color: black; padding: 15px 25px; text-decoration: none; font-weight: bold; border-radius: 50px; display: block; margin-top: 20px; transition: 0.3s; }
        .insta-btn { background: #E1306C; color: white; padding: 10px 20px; text-decoration: none; border-radius: 50px; display: inline-block; margin-top: 10px; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>YKR AURA V1.7</h1>
        <div class="owner">Chief Executive: <strong>YADAV SHER</strong></div>
        <hr color="#d4af37">
        
        <div class="status-box">
            <p>🛰️ System: <span style="color:#00ff00;">ONLINE</span></p>
            <p id="btc-price" class="btc-box">Market: Loading BTC Price...</p>
            <p>🛡️ Security: 10 Billion Mazes Active</p>
        </div>

        <p style="font-size: 0.9em; color: #aaa;">Aura is managing the Yadav Sher digital empire.</p>
        
        <a href="https://instagram.com/classy.rohit.07" target="_blank" class="insta-btn">Instagram: @classy.rohit.07</a>
        <a href="#" class="btn">SECURE ADMIN LOGIN</a>
    </div>

    <script>
        async function updatePrice() {
            try {
                const response = await fetch('https://api.coindesk.com/v1/bpi/currentprice.json');
                const data = await response.json();
                document.getElementById('btc-price').innerText = "Market: BTC $" + data.bpi.USD.rate;
            } catch (e) { document.getElementById('btc-price').innerText = "Market: Tracking Offline"; }
        }
        setInterval(updatePrice, 10000);
        updatePrice();
    </script>
</body>
</html>
