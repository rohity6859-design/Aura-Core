<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKR Aura - Private Command Center</title>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        .dashboard { border: 2px solid #d4af37; padding: 30px; display: inline-block; box-shadow: 0 0 30px #d4af37; border-radius: 20px; background: #111; margin-top: 50px; width: 90%; max-width: 450px; }
        h1 { color: #f2d06b; letter-spacing: 5px; margin-bottom: 5px; text-shadow: 2px 2px #000; }
        .owner-tag { color: #ffffff; font-size: 1.2em; margin-bottom: 25px; display: block; font-weight: bold; }
        .status-box { text-align: left; background: #000; padding: 15px; border-radius: 12px; border-left: 5px solid #00ff00; margin: 20px 0; font-family: 'Courier New', monospace; }
        .btn { background: linear-gradient(45deg, #d4af37, #f2d06b); color: black; padding: 15px 25px; text-decoration: none; font-weight: bold; border-radius: 50px; display: block; margin-top: 20px; cursor: pointer; border: none; width: 100%; font-size: 1em; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .insta-btn { background: #E1306C; color: white; padding: 12px 20px; text-decoration: none; border-radius: 50px; display: inline-block; margin-bottom: 15px; font-weight: bold; font-size: 0.9em; }
        #secret-panel { display: none; margin-top: 20px; padding: 20px; border: 1px dashed #00ff00; color: #00ff00; background: #001100; border-radius: 15px; text-align: left; box-shadow: inset 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>YKR AURA V1.8</h1>
        <span class="owner-tag">Chief Executive: YADAV SHER</span>
        
        <div class="status-box">
            <div>🛰️ SYSTEM: <span style="color:#00ff00;">ONLINE</span></div>
            <div id="btc-price">📈 MARKET: Loading BTC...</div>
            <div>🛡️ SECURITY: 10B MAZES ACTIVE</div>
        </div>

        <a href="https://instagram.com/classy.rohit.07" target="_blank" class="insta-btn">Instagram: @classy.rohit.07</a>
        
        <button class="btn" onclick="openAdmin()">SECURE ADMIN LOGIN</button>

        <div id="secret-panel">
            <h3 style="margin-top:0;">🔓 WELCOME, YADAV SHER</h3>
            <p>● Mission 2030 Status: Tracking</p>
            <p>● Ghost Maze Security: Fully Active</p>
            <p>● Global Assets: Calculating...</p>
            <button class="btn" style="background:red; color:white; font-size:0.8em;" onclick="alert('Ghost Mode is now protecting your location!')">ACTIVATE GHOST MODE</button>
        </div>
    </div>

    <script>
        function openAdmin() {
            let pass = prompt("Enter YKR Security Key:");
            if (pass === "YADAV7") { 
                alert("Access Granted, Sher!");
                document.getElementById('secret-panel').style.display = 'block';
            } else {
                alert("Wrong Key! Security Maze Activated. Don't try to hack Aura.");
            }
        }

        async function updatePrice() {
            try {
                const response = await fetch('https://api.coindesk.com/v1/bpi/currentprice.json');
                const data = await response.json();
                document.getElementById('btc-price').innerText = "📈 BTC Price: $" + data.bpi.USD.rate;
            } catch (e) { document.getElementById('btc-price').innerText = "📈 Market: Tracking Offline"; }
        }
        updatePrice();
        setInterval(updatePrice, 15000);
    </script>
</body>
</html>
