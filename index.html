<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKR Aura - Global Dashboard</title>

            color: #d4af37;

            text-align: center; 
            padding: 20px;
        }
        .dashboard { 
            border: 2px solid #d4af37; 
            padding: 30px; 
            display: inline-block; 
            box-shadow: 0 0 30px #d4af37; 
            border-radius: 20px; 
            background: #111;
            margin-top: 50px;
        }
        h1 { letter-spacing: 5px; color: #f2d06b; }
        .owner { font-size: 1.2em; margin-bottom: 20px; color: #fff; }
        .status-box { 
            text-align: left; 
            background: #000; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 5px solid #00ff00; 
        }
        .btn { 
            background: #d4af37; 
            color: black; 
            padding: 12px 25px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>YKR AURA V1.6</h1>
        <div class="owner">Chief Executive: <strong>YADAV SHER</strong></div>
        <hr color="#d4af37">
        
        <div class="status-box">
            <p>🟢 System: ONLINE</p>
            <p>🔒 Security: 10 Billion Mazes Active</p>
            <p>💰 Target: Billionaire by 2030</p>
        </div>

        <p>Aura is managing your digital empire...</p>
        <a href="#" class="btn">ADMIN LOGIN</a>
    </div>
</body>
</html>
