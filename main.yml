name: Aura Cloud Automation

on:
  schedule:
    # यह कोड हर दिन Aura को अपने आप रन करेगा
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-aura:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Aura
        run: python aura_controller.py
